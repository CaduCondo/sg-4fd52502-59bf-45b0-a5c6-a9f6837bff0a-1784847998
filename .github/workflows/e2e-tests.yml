name: E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch: # Permite execução manual

jobs:
  test:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout do código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 3. Instalar dependências principais
      - name: Install dependencies
        run: npm ci

      # 4. Instalar dependências dos testes E2E
      - name: Install E2E test dependencies
        working-directory: ./e2e
        run: npm ci

      # 5. Instalar browsers do Playwright
      - name: Install Playwright Browsers
        working-directory: ./e2e
        run: npx playwright install --with-deps chromium

      # 6. Build da aplicação
      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      # 7. Executar testes E2E
      - name: Run E2E tests
        working-directory: ./e2e
        run: npm test
        env:
          BASE_URL: http://localhost:3000
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CI: true

      # 8. Upload de artefatos (screenshots, vídeos, relatórios)
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            e2e/test-results/
            e2e/playwright-report/
          retention-days: 30

      # 9. Upload relatório HTML como GitHub Pages (opcional)
      - name: Upload HTML report
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: e2e/test-results/html-report

      # 10. Enviar email com relatório
      - name: Send Email Report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🧪 E2E Tests - ${{ job.status }} - ${{ github.repository }}"
          to: stefcadu@gmail.com
          from: GitHub Actions <noreply@github.com>
          html_body: |
            <h2>🧪 Relatório de Testes E2E</h2>
            
            <p><strong>Repositório:</strong> ${{ github.repository }}</p>
            <p><strong>Branch:</strong> ${{ github.ref_name }}</p>
            <p><strong>Commit:</strong> ${{ github.sha }}</p>
            <p><strong>Autor:</strong> ${{ github.actor }}</p>
            <p><strong>Status:</strong> <span style="color: ${{ job.status == 'success' && 'green' || 'red' }}; font-weight: bold;">${{ job.status }}</span></p>
            
            <h3>📊 Resumo</h3>
            <p>Veja os detalhes completos em: <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">GitHub Actions</a></p>
            
            <h3>📸 Evidências</h3>
            <p>Screenshots, vídeos e relatórios estão disponíveis nos artefatos da execução.</p>
            
            <hr>
            <p><small>Executado em: ${{ github.event_name }} - ${{ github.workflow }}</small></p>
          attachments: e2e/test-results/junit.xml

      # 11. Publicar relatório HTML (opcional - requer GitHub Pages configurado)
      - name: Deploy report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./e2e/test-results/html-report
          destination_dir: e2e-reports/${{ github.run_number }}

  # Job de deploy só executa se testes passarem
  deploy:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

      - name: Notify deployment success
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ Deploy Concluído - ${{ github.repository }}"
          to: stefcadu@gmail.com
          from: GitHub Actions <noreply@github.com>
          body: |
            Deploy concluído com sucesso!
            
            Repositório: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            
            Todos os testes E2E passaram ✅
            Aplicação deployada em produção 🚀