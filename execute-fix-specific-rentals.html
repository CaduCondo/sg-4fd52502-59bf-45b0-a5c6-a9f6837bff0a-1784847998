<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executar Fix Specific Rentals</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Processando Recebimentos</h1>
    <div id="result"></div>

    <script>
        const supabaseUrl = 'https://hghfvlylgnuqakwvgqvm.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhnaGZ2bHlsZ251cWFrd3ZncXZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY5NjY4ODgsImV4cCI6MjA1MjU0Mjg4OH0.BLjZ3KGJDPXvRQoQNX_K_rXIJ5xBW76YkD-_ByaRNXM';
        
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function executeFix() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>⏳ Processando...</p>';

            try {
                const { data, error } = await supabase.functions.invoke('fix-specific-rentals');

                if (error) {
                    resultDiv.innerHTML = `<pre style="color: red;">❌ Erro: ${JSON.stringify(error, null, 2)}</pre>`;
                } else {
                    resultDiv.innerHTML = `<pre style="color: green;">✅ Resultado:\n\n${JSON.stringify(data, null, 2)}</pre>`;
                }
            } catch (err) {
                resultDiv.innerHTML = `<pre style="color: red;">❌ Erro: ${err.message}</pre>`;
            }
        }

        // Executar automaticamente ao carregar
        executeFix();
    </script>
</body>
</html>
